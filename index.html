  <style>
    /* ─── Base Styles ─── */
    body {
      background-color: #FAF9F6;
      color: #1E1B4B;
      font-family: 'Roboto', sans-serif !important;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background-color 0.3s, color 0.3s;
    }

    body.dark {
      background-color: #0F172A;
      color: #F8FAFC;
    }

    h1,
    h2,
    h3,
    button,
    select,
    span,
    p,
    a,
    div,
    input {
      font-family: 'Roboto', sans-serif !important;
    }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(124, 58, 237, 0.2);
      border-radius: 10px;
    }

    /* ─── Layout ─── */
    #navbar {
      height: 70px;
      background: rgba(250, 249, 246, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(124, 58, 237, 0.1);
      z-index: 50;
      flex-shrink: 0;
      transition: background 0.3s, border-color 0.3s;
    }

    body.dark #navbar {
      background: rgba(15, 23, 42, 0.85);
      border-bottom: 1px solid #334155;
    }

    #app-container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #map-pane {
      width: 45%;
      position: relative;
      border-right: 1px solid rgba(124, 58, 237, 0.1);
      z-index: 10;
    }

    body.dark #map-pane {
      border-right: 1px solid #334155;
    }

    #map {
      width: 100%;
      height: 100%;
      background: #F0EDE6;
    }

    #list-pane {
      width: 55%;
      overflow-y: auto;
      position: relative;
      background: #FAF9F6;
      transition: background-color 0.3s;
    }

    body.dark #list-pane {
      background: #0F172A;
    }

    /* ─── Mascot Animations ─── */
    @keyframes sway {

      0%,
      100% {
        transform: rotate(-3deg);
      }

      50% {
        transform: rotate(3deg);
      }
    }

    .animate-sway {
      animation: sway 3s ease-in-out infinite;
      transform-origin: bottom center;
    }

    @keyframes landBounce {

      0%,
      100% {
        transform: translateY(0);
      }

      30% {
        transform: translateY(-15px);
      }

      50% {
        transform: translateY(0);
      }

      70% {
        transform: translateY(-6px);
      }
    }

    .mascot-land-active {
      animation: landBounce 0.6s ease-out;
    }

    .mascot-marker-container {
      background: transparent !important;
      border: none !important;
    }

    /* ─── Map Overrides ─── */
    .leaflet-control-zoom {
      border: none !important;
      box-shadow: 0 4px 12px rgba(30, 27, 75, 0.08) !important;
      border-radius: 12px !important;
      overflow: hidden;
    }

    .leaflet-control-zoom a {
      background: rgba(250, 249, 246, 0.9) !important;
      color: #1E1B4B !important;
      border-bottom: 1px solid rgba(124, 58, 237, 0.1) !important;
    }

    body.dark .leaflet-control-zoom a {
      background: #1E293B !important;
      color: #F8FAFC !important;
      border-bottom: 1px solid #334155 !important;
    }

    .leaflet-control-attribution {
      display: none !important;
    }

    /* ─── Marker & Popup ─── */
    .custom-marker {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .marker-inner {
      width: 100%;
      height: 100%;
      background: white;
      border: 2px solid #7C3AED;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.2);
    }

    .custom-marker.active .marker-inner {
      transform: scale(1.2);
      background: #7C3AED;
      border-color: #FAF9F6;
      box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.3), 0 8px 24px rgba(124, 58, 237, 0.4);
    }

    /* Giao diện mờ khi đã check-in */
    .itin-card.checked-in-mode {
      opacity: 0.6;
    }

    .leaflet-popup-content-wrapper {
      background: rgba(250, 249, 246, 0.95) !important;
      backdrop-filter: blur(16px);
      border: 1px solid rgba(124, 58, 237, 0.15) !important;
      border-radius: 20px !important;
      box-shadow: 0 12px 32px rgba(30, 27, 75, 0.1) !important;
      padding: 0 !important;
    }

    body.dark .leaflet-popup-content-wrapper {
      background: rgba(30, 41, 59, 0.95) !important;
      border: 1px solid #475569 !important;
      color: #F8FAFC !important;
    }

    .leaflet-popup-tip {
      background: rgba(250, 249, 246, 0.95) !important;
    }

    body.dark .leaflet-popup-tip {
      background: rgba(30, 41, 59, 0.95) !important;
    }

    .leaflet-popup-content {
      margin: 0 !important;
    }

    /* ─── ITINERARY CARD (ĐÃ BỎ HIỆU ỨNG TILT 3D) ─── */
    .itin-card {
      background: white;
      border: 1px solid rgba(124, 58, 237, 0.1);
      border-radius: 24px;
      padding: 16px;
      display: flex;
      gap: 16px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(30, 27, 75, 0.03);
      position: relative;
      transition: border-color 0.3s, background-color 0.3s, transform 0.2s ease, box-shadow 0.2s ease;
    }

    body.dark .itin-card {
      background: #1E293B;
      border-color: #334155;
    }

    .itin-card:hover {
      transform: translateY(-3px);
      /* Nhấc nhẹ thẻ lên đều đặn, không bị nghiêng lệch */
      box-shadow: 0 12px 32px rgba(124, 58, 237, 0.12);
      border-color: rgba(124, 58, 237, 0.4);
    }

    .itin-card.active {
      border-color: #7C3AED;
      box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.2), 0 16px 40px rgba(124, 58, 237, 0.12);
      background: #FDFBF7;
    }

    body.dark .itin-card.active {
      background: #334155;
      border-color: #A78BFA;
    }

    .card-img {
      width: 120px;
      height: 120px;
      border-radius: 16px;
      object-fit: cover;
      flex-shrink: 0;
      background: #F0EDE6;
    }

    .card-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 8px;
    }

    .badge-see {
      background: #E9D5FF;
      color: #7C3AED;
    }

    .badge-eat {
      background: #FECACA;
      color: #DC2626;
    }

    .badge-mall {
      background: #FBCFE8;
      color: #DB2777;
    }

    .badge-photo {
      background: #D9F99D;
      color: #4D7C0F;
    }

    /* ─── Sticky Header ─── */
    .sticky-filters {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(250, 249, 246, 0.9);
      backdrop-filter: blur(16px);
      padding: 20px 32px 16px;
      border-bottom: 1px solid rgba(124, 58, 237, 0.1);
      transition: background 0.3s, border-color 0.3s;
    }

    body.dark .sticky-filters {
      background: rgba(15, 23, 42, 0.9);
      border-bottom: 1px solid #334155;
    }

    @media (max-width: 1024px) {
      #app-container {
        flex-direction: column;
        overflow: auto;
      }

      #map-pane {
        width: 100%;
        height: 40vh;
        flex-shrink: 0;
      }

      #list-pane {
        width: 100%;
        overflow: visible;
      }

      body {
        overflow: auto;
      }
    }
  </style>
</head>

    // ─── SOUND UI AUDIO SYNTHESIZER ───
    function playSound(type) {
      if (!isSoundOn) return;
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();

        if (type === 'pop') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(400, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(120, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.1);
          osc.connect(gain); gain.connect(ctx.destination);
          osc.start(); osc.stop(ctx.currentTime + 0.1);
        } else if (type === 'chime') {
          const now = ctx.currentTime;
          [600, 800, 1000].forEach((freq, index) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, now + index * 0.05);
            gain.gain.setValueAtTime(0.15, now + index * 0.05);
            gain.gain.linearRampToValueAtTime(0, now + index * 0.05 + 0.2);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(now + index * 0.05); osc.stop(now + index * 0.05 + 0.2);
          });
        }
      } catch (e) { console.log(e); }
    }

    function initCountdown() {
      const targetDate = new Date('2026-10-11T00:00:00').getTime();
      setInterval(() => {
        const now = new Date().getTime();
        const difference = targetDate - now;
        if (difference < 0) {
          document.getElementById('countdown-navbar').innerHTML = "✨ Chuyến đi đã bắt đầu! ✨";
          return;
        }
        const days = Math.floor(difference / (1000 * 60 * 60 * 24));
        const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((difference % (1000 * 60)) / 1000);

        document.getElementById('nav-days').innerText = days.toString().padStart(2, '0');
        document.getElementById('nav-hours').innerText = hours.toString().padStart(2, '0');
        document.getElementById('nav-minutes').innerText = minutes.toString().padStart(2, '0');
        document.getElementById('nav-seconds').innerText = seconds.toString().padStart(2, '0');
      }, 1000);
    }

            <div class="w-7 h-7 bg-pink-300 rounded-full relative border border-pink-400 flex flex-col items-center justify-center">
              <span class="absolute -top-1.5 text-[9px]">🎀</span>
              <div class="flex gap-1 mb-0.5"><span class="w-0.5 h-0.5 bg-navy rounded-full"></span><span class="w-0.5 h-0.5 bg-navy rounded-full"></span></div>
            </div>
          </div>
          <span class="text-[10px] font-extrabold text-purple-700 pr-1">💖</span>
        </div>
      `;

      const mascotIcon = L.divIcon({
        className: 'mascot-marker-container',
        html: mascotHtml,
        iconSize: [110, 50],
        iconAnchor: [55, 45]
      });

      mascotMarker = L.marker(defaultCenter, { zIndexOffset: 1000, icon: mascotIcon }).addTo(map);
    }

    function updateMapStyle() {
      if (!map) return;
      map.removeLayer(mapTileLayer);
      if (isDarkMode) {
        mapTileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}{r}.png', {
          maxZoom: 19
        }).addTo(map);
      } else {
        mapTileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
          maxZoom: 19
        }).addTo(map);
      }
    }

    function flyMascotTo(coords) {
      if (!mascotMarker) return;
      mascotMarker.setLatLng(coords);
      playSound('chime');
      const wrapper = document.getElementById('live-mascot-wrapper');
      if (wrapper) {
        wrapper.classList.remove('mascot-land-active');
        void wrapper.offsetWidth;
        wrapper.classList.add('mascot-land-active');
      }
    }

    function drawRoute(filteredPlaces) {
      if (routeLine) map.removeLayer(routeLine);
      if (currentDay === 'all' || filteredPlaces.length < 2) return;

      const routeCoords = filteredPlaces.map(p => p.coords);
      routeLine = L.polyline(routeCoords, {
        color: isDarkMode ? '#A78BFA' : '#7C3AED',
        weight: 4,
        opacity: 0.8,
        dashArray: '10, 10',
        lineCap: 'round',
        lineJoin: 'round'
      }).addTo(map);
    }

    function render() {
      const container = document.getElementById('cards-container');
      container.innerHTML = '';
      markersGroup.clearLayers();

      const filtered = PLACES.filter(p => {
        const catMatch = currentCat === 'all' || p.cat === currentCat;
        const dayMatch = currentDay === 'all' || p.day.toString() === currentDay;

        const data = p.lang[currentLang] || p.lang['vi'];
        const searchMatch = searchQuery === '' ||
          data.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
          data.subtitle.toLowerCase().includes(searchQuery.toLowerCase());

        return catMatch && dayMatch && searchMatch;
      });

      drawRoute(filtered);

      if (filtered.length === 0) {
        container.innerHTML = `<div class="text-center py-12 font-medium text-muted dark:text-slate-400">${TRANSLATIONS[currentLang].noFound}</div>`;
        return;
      }

      const bounds = [];

      filtered.forEach((place) => {
        const data = place.lang[currentLang] || place.lang['vi'];
        const t = TRANSLATIONS[currentLang];
        const isChecked = checkedPlaces.includes(place.id);

        const card = document.createElement('div');
        card.className = `itin-card mb-4 ${isChecked ? 'checked-in-mode' : ''}`;
        card.id = `card-${place.id}`;
        card.innerHTML = `
          <img src="${place.img}" class="card-img" onerror="this.src='https://images.unsplash.com/photo-1508009603885-50cf7c579365?w=300'"/>
          <div class="flex flex-col justify-between flex-1">
            <div>
              <div class="flex items-center justify-between mb-1.5">
                <span class="card-badge ${place.badgeClass}">${t[place.catType]}</span>
                <div class="flex items-center gap-2">
                  <button data-id="${place.id}" class="checkin-btn text-[11px] font-bold px-2 py-0.5 rounded-full transition-all border ${isChecked ? 'bg-pink-100 text-pink-600 border-pink-300 dark:bg-pink-950/50 dark:text-pink-400 dark:border-pink-800' : 'bg-purple-50 text-purple-600 border-purple-200 dark:bg-slate-700 dark:text-purple-300 dark:border-slate-600 hover:bg-purple-100'
          }">
                    ${isChecked ? t.btnChecked : t.btnCheckIn}
                  </button>
                  <span class="text-xs font-bold text-lilac-dark dark:text-purple-300 bg-purple-50 dark:bg-slate-700 px-2 py-0.5 rounded-md">${t.dayLabel} ${place.day}</span>
                </div>
              </div>
              <h3 class="font-bold text-base text-navy dark:text-slate-100 leading-snug">${place.emoji} ${data.name}</h3>
              <p class="text-xs text-muted dark:text-slate-400 font-medium mt-1">${data.subtitle}</p>
            </div>
            <div class="bg-cream-dark/40 dark:bg-slate-800 px-3 py-2 rounded-xl border border-cream-dark dark:border-slate-700 text-[11px] text-navy dark:text-slate-300 font-medium mt-2 flex items-start gap-1.5">
              <span>💡</span>
              <span>${data.tip}</span>
            </div>
          </div>
        `;

        card.addEventListener('click', (e) => {
          if (e.target.closest('.checkin-btn')) return;
          document.querySelectorAll('.itin-card').forEach(c => c.classList.remove('active'));
          card.classList.add('active');
          map.flyTo(place.coords, 15, { duration: 1.2 });
          flyMascotTo(place.coords);
          openPopup(place.id);
        });

        container.appendChild(card);
        bounds.push(place.coords);

        const customIcon = L.divIcon({
          className: `custom-marker marker-id-${place.id}`,
          html: `<div class="marker-inner">${place.emoji}</div>`,
          iconSize: [40, 40],
          iconAnchor: [20, 20],
          popupAnchor: [0, -20]
        });

        const marker = L.marker(place.coords, { icon: customIcon }).addTo(markersGroup);

        const popupContent = `
          <div class="p-3 w-56 text-navy dark:text-slate-200">
            <h4 class="font-bold text-sm mb-1">${place.emoji} ${data.name}</h4>
            <p class="text-[11px] text-muted dark:text-slate-400 leading-tight">${data.subtitle}</p>
          </div>
        `;
        marker.bindPopup(popupContent);

        marker.on('click', () => {
          document.querySelectorAll('.itin-card').forEach(c => c.classList.remove('active'));
          const targetCard = document.getElementById(`card-${place.id}`);
          if (targetCard) {
            targetCard.classList.add('active');
            targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
          setActiveMarker(place.id);
          flyMascotTo(place.coords);
        });
      });

      document.querySelectorAll('.checkin-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          playSound('pop');
          const id = parseInt(btn.dataset.id);
          const index = checkedPlaces.indexOf(id);
          if (index === -1) {
            checkedPlaces.push(id);
            confetti({
              particleCount: 120, spread: 70, origin: { y: 0.6 },
              colors: ['#7C3AED', '#FF69B4', '#84CC16', '#FFD700']
            });
            playSound('chime');
          } else {
            checkedPlaces.splice(index, 1);
          }
          localStorage.setItem('bkk_checked_places', JSON.stringify(checkedPlaces));
          updateProgressBar();
          render();
        });
      });

      if (bounds.length > 0 && currentDay !== 'all') {
        map.fitBounds(bounds, { padding: [50, 50], maxZoom: 14 });
      }
    }

    function setActiveMarker(id) {
      document.querySelectorAll('.custom-marker').forEach(m => m.classList.remove('active'));
      const activeEl = document.querySelector(`.marker-id-${id}`);
      if (activeEl) activeEl.classList.add('active');
    }

    document.addEventListener('DOMContentLoaded', () => {
      initCountdown();
      initMap();
      updateUIStrings();
      updateProgressBar();
      render();

      // THANH TÌM KIẾM REAL-TIME
      document.getElementById('search-input').addEventListener('input', (e) => {
        searchQuery = e.target.value;
        render();
      });

      // ĐỔI CHẾ ĐỘ DARK MODE
      const darkToggle = document.getElementById('dark-mode-toggle');
      darkToggle.addEventListener('click', () => {
        isDarkMode = !isDarkMode;
        playSound('pop');
        if (isDarkMode) {
          document.body.classList.add('dark');
          document.documentElement.classList.add('dark');
          darkToggle.innerText = "☀️ Ngày";
        } else {
          document.body.classList.remove('dark');
          document.documentElement.classList.remove('dark');
          darkToggle.innerText = "🌙 Đêm";
        }
        updateMapStyle();
        render();
      });

      const soundToggle = document.getElementById('sound-toggle');
      soundToggle.addEventListener('click', () => {
        isSoundOn = !isSoundOn;
        soundToggle.innerText = isSoundOn ? "🔊 Bật Âm" : "🔇 Tắt Âm";
        if (isSoundOn) playSound('pop');
      });

      document.getElementById('lang-selector').addEventListener('change', (e) => {
        playSound('pop');
        currentLang = e.target.value;
        updateUIStrings();
        render();
      });

      document.getElementById('cat-filters').addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (!btn) return;
        playSound('pop');
        document.querySelectorAll('#cat-filters button').forEach(b => {
          b.classList.remove('text-purple-600', 'active');
          b.classList.add('text-gray-500');
        });
        btn.classList.add('text-purple-600', 'active');
        btn.classList.remove('text-gray-500');
        currentCat = btn.dataset.cat;
        render();
      });

      document.getElementById('day-filters').addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (!btn) return;
        playSound('pop');
        document.querySelectorAll('#day-filters button').forEach(b => {
          b.classList.remove('bg-purple-100', 'dark:bg-purple-900/40', 'border-purple-400');
          b.classList.add('bg-white', 'dark:bg-slate-800', 'border-gray-200', 'dark:border-slate-700');
        });
        btn.classList.remove('bg-white', 'dark:bg-slate-800', 'border-gray-200', 'dark:border-slate-700');
        btn.classList.add('bg-purple-100', 'dark:bg-purple-900/40', 'border-purple-400');
        currentDay = btn.dataset.day;
        render();
      });
    });

    function openPopup(id) {
      markersGroup.eachLayer((layer) => {
        if (layer.getLatLng && layer.getPopup()) {
          const className = layer.options.icon.options.className;
          if (className.includes(`marker-id-${id}`)) {
            layer.openPopup();
            setActiveMarker(id);
          }
        }
      });
    }
  </script>
</body>

</html>
